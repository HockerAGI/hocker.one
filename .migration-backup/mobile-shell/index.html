<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8" />
    <title>Hocker ONE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <style>
      :root {
        color-scheme: dark;
        background: #020617;
        color: #e5f6ff;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(56,189,248,.22), transparent 32%),
          radial-gradient(circle at 80% 10%, rgba(168,85,247,.18), transparent 28%),
          linear-gradient(180deg, #020617, #07111f 45%, #020617);
      }

      .grid {
        position: fixed;
        inset: 0;
        opacity: .16;
        background-image:
          linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
      }

      .card {
        position: relative;
        z-index: 2;
        width: min(86vw, 420px);
        padding: 28px;
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 28px;
        background: rgba(2,6,23,.62);
        backdrop-filter: blur(24px);
        box-shadow: 0 32px 90px rgba(0,0,0,.45);
        text-align: center;
      }

      img {
        width: min(260px, 76%);
        height: auto;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        letter-spacing: -.03em;
      }

      p {
        margin: 0;
        color: rgba(226,232,240,.76);
        font-size: 14px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <main class="card">
      <img src="/brand/hocker-one-logo.png" alt="Hocker ONE" />
      <h1>Conectando Hocker ONE</h1>
      <p>Verifica tu conexión e intenta abrir nuevamente la app.</p>
    </main>
  </body>
</html>
